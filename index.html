<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite + React + TS</title>
    
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
<script src="https://www.gstatic.com/dialogflow-console/fast/messenger/bootstrap.js?v=1"></script>
<df-messenger
  intent="WELCOME"
  chat-title="Chat-Bot"
  agent-id="49d081e3-692b-4f9d-8702-541f0abf7864"
  language-code="vi"
></df-messenger>
<div id="bot-avatar" onclick="openChat()">
  <img src="/hi.png" alt="Bot" />
</div>
<script>
  function openChat() {
  const chat = document.querySelector("df-messenger");
  if (!chat) return;

  setTimeout(() => {
    const btn = chat.shadowRoot?.querySelector("df-messenger-button");
    if (btn) {
      btn.dispatchEvent(new Event("click"));
    }
  }, 500);
}

</script>

  </body>
  <style>
  #bot-avatar {
    position: fixed;
    bottom: 90px; /* cao hơn khung chat */
    right: 20px;
    width: 80px;
    height: 80px;
    z-index: 9999;
    cursor: pointer;
    animation: wave 2s infinite ease-in-out;
  }

  #bot-avatar img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  @keyframes wave {
    0% { transform: rotate(0deg); }
    25% { transform: rotate(5deg); }
    50% { transform: rotate(0deg); }
    75% { transform: rotate(-5deg); }
    100% { transform: rotate(0deg); }
  }
</style>

</html>
